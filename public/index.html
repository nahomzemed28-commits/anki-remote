<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Anki Remote</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="status-bar">
    <span id="deck-name">Anki Remote</span>
    <span id="conn-dot" class="dot dot-off"></span>
  </header>

  <main id="card-area">
    <div id="empty-state">
      <p id="empty-message">Not reviewing.</p>
      <p class="hint">Open a deck in Anki on your computer and start reviewing — this page will sync automatically.</p>
    </div>
    <div id="card-content" class="hidden"></div>
  </main>

  <footer id="controls">
    <button id="show-answer-btn" class="primary-btn hidden">Show Answer</button>
    <div id="ease-buttons" class="hidden"></div>
    <button id="undo-btn" class="secondary-btn">Undo</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
