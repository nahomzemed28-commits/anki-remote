<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Anki Remote</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <span id="conn-dot" class="dot dot-off"></span>

  <main id="app">
    <div id="empty-state" class="zone">
      <p id="empty-message">Not reviewing</p>
    </div>
    <button id="show-answer-btn" class="primary-btn zone hidden">Show Answer</button>
    <div id="ease-buttons" class="zone hidden"></div>
  </main>

  <button id="undo-btn">Undo</button>

  <script src="app.js"></script>
</body>
</html>
